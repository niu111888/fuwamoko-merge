function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

// ===== 長文(文章モード)データ: 多エージェントで検証済み =====
const SENT = {
  en: [
    { native: "the little rabbit hops on clouds", typed: "the little rabbit hops on clouds", hint: "小さなうさぎが雲の上をはねる" },
    { native: "a happy pig loves pink hearts", typed: "a happy pig loves pink hearts", hint: "しあわせなぶたはピンクのハートが好き" },
    { native: "the panda hugs a soft cloud", typed: "the panda hugs a soft cloud", hint: "パンダがふわふわの雲をだきしめる" },
    { native: "tiny rabbits eat sweet carrots", typed: "tiny rabbits eat sweet carrots", hint: "ちいさなうさぎが甘いにんじんを食べる" },
    { native: "hearts float up in the sky", typed: "hearts float up in the sky", hint: "ハートが空にういていく" },
    { native: "the pig and panda are best friends", typed: "the pig and panda are best friends", hint: "ぶたとパンダはなかよし" },
    { native: "fluffy clouds make a cozy bed", typed: "fluffy clouds make a cozy bed", hint: "ふわふわの雲があたたかいベッドになる" },
    { native: "a rabbit shares a big carrot", typed: "a rabbit shares a big carrot", hint: "うさぎが大きなにんじんをわけあう" },
    { native: "the panda smiles at the sky", typed: "the panda smiles at the sky", hint: "パンダが空にほほえむ" },
    { native: "pink hearts dance over the hills", typed: "pink hearts dance over the hills", hint: "ピンクのハートが丘の上でおどる" },
  ],

    { native: "ねこ が ごろごろ ねむる", typed: "neko ga gorogoro nemuru", hint: "The cat sleeps purring" },

    { native: "くまさん が はちみつ だいすき", typed: "kumasan ga hachimitsu daisuki", hint: "The bear loves honey" },
    { native: "もこもこ の ひつじ かわいい", typed: "mokomoko no hitsuji kawaii", hint: "The fluffy sheep is cute" },
    { native: "ぱんだ が ささ を たべる", typed: "panda ga sasa o taberu", hint: "The panda eats bamboo" },
    { native: "こねこ が ぴょん と とぶ", typed: "koneko ga pyon to tobu", hint: "The kitten hops" },
    { native: "あひる が すいすい およぐ", typed: "ahiru ga suisui oyogu", hint: "The duck swims smoothly" },
    { native: "りす が どんぐり を あつめる", typed: "risu ga donguri o atsumeru", hint: "The squirrel gathers acorns" },
  ],
  zh: [
    { native: "我喜欢毛茸茸的兔子", typed: "wo xihuan maorongrong de tuzi", hint: "I like the fluffy bunny" },
    { native: "小猫在睡觉", typed: "xiao mao zai shuijiao", hint: "the kitten is sleeping" },
    { native: "小狗摇尾巴", typed: "xiao gou yao weiba", hint: "the puppy wags its tail" },
    { native: "小熊抱抱我", typed: "xiao xiong baobao wo", hint: "the little bear hugs me" },
    { native: "兔子吃萝卜", typed: "tuzi chi luobo", hint: "the bunny eats a carrot" },
    { native: "小鸭子游水", typed: "xiao yazi you shui", hint: "the duckling swims" },
    { native: "毛茸茸真可爱", typed: "maorongrong zhen keai", hint: "fluffy and so cute" },
    { native: "小猪打滚", typed: "xiao zhu da gun", hint: "the piglet rolls around" },
    { native: "我爱软软的枕头", typed: "wo ai ruanruan de zhentou", hint: "I love the soft pillow" },
    { native: "小鸟唱歌", typed: "xiao niao changge", hint: "the little bird sings" },
  ],
};
const LANG_LABEL = { en: "English", zh: "中文", ja: "日本語", mix: "ぜんぶ" };

// ===== むずかしさ =====
const DIFFS = {
  easy:     { label: "やさしい",   sub: "ゆっくり・ライフ5",       lives: 5, base: 0.45, rampDiv: 85, vyCap: 1.0, spawnBase: 130, spawnRamp: 0.7, spawnMin: 60, len: "short" },
  normal:   { label: "ふつう",     sub: "バランス・ライフ3",       lives: 3, base: 0.62, rampDiv: 55, vyCap: 1.5, spawnBase: 96,  spawnRamp: 1.1, spawnMin: 44, len: "any" },
  hard:     { label: "むずかしい", sub: "はやい・ライフ3・長め",   lives: 3, base: 0.92, rampDiv: 38, vyCap: 2.2, spawnBase: 72,  spawnRamp: 1.5, spawnMin: 32, len: "long" },
  sentence: { label: "ぶんしょう", sub: "長文・1つずつ・ライフ3",  lives: 3, base: 0.30, rampDiv: 130, vyCap: 0.45, mode: "sentence" },
};
const DIFF_KEYS = ["easy", "normal", "hard", "sentence"];

// ===== レイアウト =====
let W, H, unit, topLine, bottomLine;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  unit = Math.min(W, H) / 700;
  topLine = H * 0.17;
  bottomLine = H * 0.85;
}

// ===== 状態 =====
const STATE = { SELECT: 0, DIFF: 1, PLAY: 2, PAUSE: 3, OVER: 4 };
let state = STATE.SELECT;
let lang = "mix", diffKey = "normal", cfg = DIFFS.normal;
let words, active, spawnT, lives, score, combo, maxCombo, cleared, totalKeys, correctKeys, frame, startFrame, pops, shake, overAt, endedManually;
let best = Number(localStorage.getItem("typingBest") || 0);
words = []; pops = []; frame = 0; shake = 0;
const isTouch = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

function pool() {
  const src = (cfg && cfg.mode === "sentence") ? SENT : WORDS;
  if (lang === "mix") return [].concat(src.en, src.ja, src.zh);
  return src[lang] || src.en;
}
function pickWord() {
  const p = pool();
  if (cfg.mode === "sentence") return p[Math.floor(Math.random() * p.length)];
  let cands = p;
  if (cfg.len === "short") cands = p.filter(w => w.typed.length <= 5);
  else if (cfg.len === "long") cands = p.filter(w => w.typed.length >= 5);
  if (!cands.length) cands = p;
  return cands[Math.floor(Math.random() * cands.length)];
}

function gotoDiff(l) { lang = l; state = STATE.DIFF; }
function start(l, d) {
  lang = l; diffKey = d || diffKey; cfg = DIFFS[diffKey];
  words = []; pops = []; active = null;
  lives = cfg.lives; score = 0; combo = 0; maxCombo = 0; cleared = 0;
  totalKeys = 0; correctKeys = 0; endedManually = false;
  spawnT = 30; startFrame = frame;
  state = STATE.PLAY;
  if (isTouch) { try { kb.focus(); } catch (e) {} }
}
function resume() { state = STATE.PLAY; if (isTouch) { try { kb.focus(); } catch (e) {} } }
function gameOver(manual) {
  endedManually = !!manual;
  state = STATE.OVER; overAt = frame;
  if (score > best) { best = score; localStorage.setItem("typingBest", best); }
  try { kb.blur(); } catch (e) {}
}

function elapsedSec() { return Math.max(0, (frame - startFrame) / 60); }
function accuracy() { return totalKeys ? Math.round(correctKeys / totalKeys * 100) : 100; }

// ===== 生成 =====
const CAP_COLORS = ["#ffd9ec", "#ffe7c2", "#d9f3d0", "#d6eeff", "#ece0ff", "#ffe0e0"];
function spawnWord() {
  const w = pickWord();
  const sentence = cfg.mode === "sentence";
  const margin = W * 0.12;
  words.push({
    native: w.native, typed: w.typed, hint: w.hint || "",
    x: sentence ? W / 2 : margin + Math.random() * (W - margin * 2),
    y: topLine - 10 * unit, matched: 0,
    vy: (cfg.base + Math.min(cfg.vyCap, elapsedSec() / cfg.rampDiv)) * unit,
    hue: Math.floor(Math.random() * 6), sentence,
  });
}

// ===== タイピング =====
function handleChar(ch) {
  if (state !== STATE.PLAY) return;
  if (!/^[a-z ]$/.test(ch)) return;
  if (!active) {
    if (ch === " ") return; // スペースではロックしない
    let cand = null;
    for (const w of words) if (w.typed[0] === ch && (!cand || w.y > cand.y)) cand = w;
    totalKeys++;
    if (cand) { active = cand; active.matched = 1; correctKeys++; combo++; maxCombo = Math.max(maxCombo, combo); checkComplete(); }
    else { combo = 0; shake = 4; }
    return;
  }
  totalKeys++;
  if (active.typed[active.matched] === ch) {
    active.matched++; correctKeys++; combo++; maxCombo = Math.max(maxCombo, combo); checkComplete();
  } else { combo = 0; shake = 4; }
}
function checkComplete() {
  if (active.matched >= active.typed.length) {
    const w = active;
    score += 100 + w.typed.length * 10 + combo * 5;
    cleared++;
    for (let i = 0; i < 16; i++) pops.push({ x: w.x, y: w.y, vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.7) * 7, life: 1, c: CAP_COLORS[w.hue] });
    words = words.filter(x => x !== w);
    active = null;
  }
}

// ===== ボタン矩形 =====
function inRect(r, x, y) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function hit(cards, x, y) { for (const c of cards) if (inRect(c, x, y)) return c; return null; }
function selectCards() {
  const cw = clamp(W * 0.34, 120, 240), ch = clamp(H * 0.13, 70, 130), gx = 16 * unit, gy = 16 * unit;
  const x0 = (W - (2 * cw + gx)) / 2, y0 = H * 0.42;
  const langs = ["en", "zh", "ja", "mix"]; const cards = [];
  for (let i = 0; i < 4; i++) { const col = i % 2, row = Math.floor(i / 2); cards.push({ lang: langs[i], x: x0 + col * (cw + gx), y: y0 + row * (ch + gy), w: cw, h: ch }); }
  return cards;
}
function diffCards() {
  const cw = clamp(W * 0.62, 220, 460), ch = clamp(H * 0.105, 52, 90), gy = 11 * unit;
  const x0 = (W - cw) / 2, y0 = H * 0.28; const cards = [];
  for (let i = 0; i < DIFF_KEYS.length; i++) cards.push({ key: DIFF_KEYS[i], x: x0, y: y0 + i * (ch + gy), w: cw, h: ch });
  return cards;
}
function backRect() { const w = clamp(96 * unit, 70, 120), h = clamp(36 * unit, 28, 46); return { x: 16, y: 16, w, h }; }
function quitRect() { const w = clamp(96 * unit, 72, 116), h = clamp(36 * unit, 28, 46); return { x: W - w - 14, y: 14, w, h }; }
function pauseResumeRect() { const w = clamp(W * 0.5, 180, 300), h = clamp(56 * unit, 44, 70); return { x: (W - w) / 2, y: H * 0.44, w, h }; }
function pauseEndRect() { const w = clamp(W * 0.5, 180, 300), h = clamp(56 * unit, 44, 70); return { x: (W - w) / 2, y: H * 0.44 + clamp(56 * unit, 44, 70) + 18 * unit, w, h }; }

// ===== 入力 =====
function tap(x, y) {
  if (state === STATE.SELECT) { const c = hit(selectCards(), x, y); if (c) gotoDiff(c.lang); return; }
  if (state === STATE.DIFF) { if (inRect(backRect(), x, y)) { state = STATE.SELECT; return; } const c = hit(diffCards(), x, y); if (c) start(lang, c.key); return; }
  if (state === STATE.PLAY) { if (inRect(quitRect(), x, y)) { state = STATE.PAUSE; try { kb.blur(); } catch (e) {} } return; }
  if (state === STATE.PAUSE) { if (inRect(pauseResumeRect(), x, y)) resume(); else if (inRect(pauseEndRect(), x, y)) gameOver(true); return; }
  if (state === STATE.OVER) { if (frame - overAt > 24) state = STATE.SELECT; }
}
canvas.addEventListener("pointerdown", e => {
  e.preventDefault();
  tap(e.clientX, e.clientY);
  if (state === STATE.PLAY && isTouch) { try { kb.focus(); } catch (err) {} }
});
window.addEventListener("pointerdown", () => { if (state === STATE.PLAY && isTouch) { try { kb.focus(); } catch (e) {} } });
window.addEventListener("keydown", e => {
  if (state === STATE.SELECT) {
    if (e.code === "Digit1") gotoDiff("en"); else if (e.code === "Digit2") gotoDiff("zh");
    else if (e.code === "Digit3") gotoDiff("ja"); else if (e.code === "Space" || e.code === "Enter" || e.code === "Digit4") { e.preventDefault(); gotoDiff("mix"); }
    return;
  }
  if (state === STATE.DIFF) {
    if (e.code === "Digit1") start(lang, "easy"); else if (e.code === "Digit2") start(lang, "normal");
    else if (e.code === "Digit3") start(lang, "hard"); else if (e.code === "Digit4") start(lang, "sentence");
    else if (e.code === "Escape" || e.code === "Backspace") { e.preventDefault(); state = STATE.SELECT; }
    return;
  }
  if (state === STATE.PAUSE) { if (e.code === "Space" || e.code === "Enter" || e.code === "Escape") { e.preventDefault(); resume(); } return; }
  if (state === STATE.OVER) { if (e.code === "Space" || e.code === "Enter") { if (frame - overAt > 24) state = STATE.SELECT; } return; }
  if (state === STATE.PLAY && !isTouch) {
    if (e.code === "Escape") { e.preventDefault(); state = STATE.PAUSE; return; }
    if (e.key && e.key.length === 1) { e.preventDefault(); handleChar(e.key.toLowerCase()); }
  }
});
kb.addEventListener("input", e => { const d = e.data; if (d) for (const ch of d) handleChar(ch.toLowerCase()); kb.value = ""; });

// ===== 更新 =====
function update() {
  frame++;
  if (shake > 0) shake *= 0.8;
  if (state === STATE.PLAY) {
    if (cfg.mode === "sentence") {
      // 長文は1つずつ。画面に無くなったら少し間をおいて次を出す
      if (words.length === 0) { spawnT--; if (spawnT <= 0) { spawnWord(); spawnT = 28; } }
    } else {
      spawnT--;
      if (spawnT <= 0) { spawnWord(); spawnT = Math.max(cfg.spawnMin, cfg.spawnBase - elapsedSec() * cfg.spawnRamp) + Math.random() * 25; }
    }
    for (const w of words) w.y += w.vy;
    for (const w of words.slice()) {
      if (w.y > bottomLine) {
        lives--; shake = 8; combo = 0;
        if (active === w) active = null;
        words = words.filter(x => x !== w);
        if (lives <= 0) { gameOver(false); break; }
      }
    }
  }
  for (const p of pops) { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.03; }
  pops = pops.filter(p => p.life > 0);
}

// ===== 描画 =====
function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
function drawBg() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#ffe3f1"); sky.addColorStop(1, "#d8f0ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  for (let i = 0; i < 4; i++) {
    const cx = ((i * (W / 3 + 40) - frame * 0.2) % (W + 120) + W + 120) % (W + 120) - 60;
    const cy = H * 0.09 + i * H * 0.06;
    ctx.beginPath(); ctx.arc(cx, cy, 16 * unit, 0, Math.PI * 2); ctx.arc(cx + 20 * unit, cy, 22 * unit, 0, Math.PI * 2); ctx.arc(cx + 42 * unit, cy, 14 * unit, 0, Math.PI * 2); ctx.fill();
  }
}
function text(t, y, size, color, align, x) {
  ctx.fillStyle = color || "#fff"; ctx.font = `bold ${size}px sans-serif`;
  ctx.textAlign = align || "center"; ctx.textBaseline = "alphabetic";
  ctx.lineWidth = size * 0.12; ctx.strokeStyle = "rgba(120,60,90,0.35)";
  const px = x != null ? x : (align === "left" ? 20 : W / 2);
  ctx.strokeText(t, px, y); ctx.fillText(t, px, y);
}
function pill(r, fill, stroke, label, labelColor) {
  roundRect(r.x, r.y, r.w, r.h, r.h / 2); ctx.fillStyle = fill; ctx.fill();
  if (stroke) { ctx.lineWidth = 2 * unit; ctx.strokeStyle = stroke; ctx.stroke(); }
  ctx.fillStyle = labelColor; ctx.font = `bold ${clamp(r.h * 0.42, 11, 22)}px sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2);
}

function wrapByMeasure(str, maxW) {
  const lines = [];
  if (str.indexOf(" ") >= 0) {
    let line = "";
    for (const wd of str.split(" ")) {
      const test = line ? line + " " + wd : wd;
      if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = wd; }
      else line = test;
    }
    if (line) lines.push(line);
  } else {
    let line = "";
    for (const ch of str) {
      if (ctx.measureText(line + ch).width > maxW && line) { lines.push(line); line = ch; }
      else line += ch;
    }
    if (line) lines.push(line);
  }
  return lines;
}
// typed文字列を、各文字に全体インデックス(gi)を付けて折り返す(等幅前提)
function wrapTypedChars(typed, maxW, charW) {
  const maxChars = Math.max(4, Math.floor(maxW / charW));
  const lines = []; let line = [];
  for (let i = 0; i < typed.length; i++) {
    if (line.length >= maxChars) {
      let br = -1;
      for (let k = line.length - 1; k >= 0; k--) if (line[k].ch === " ") { br = k; break; }
      if (br > 0) { const rest = line.slice(br + 1); lines.push(line.slice(0, br)); line = rest; }
      else { lines.push(line); line = []; }
    }
    line.push({ ch: typed[i], gi: i });
  }
  if (line.length) lines.push(line);
  return lines;
}
function drawSentence(w) {
  const single = w.native === w.typed;
  const bigN = clamp(22 * unit, 15, 28), sub = clamp(19 * unit, 13, 24);
  const maxW = W * 0.84;
  ctx.font = `bold ${sub}px monospace`;
  const charW = ctx.measureText("m").width;
  const tLines = wrapTypedChars(w.typed, maxW, charW);
  let nLines = [];
  if (!single) { ctx.font = `bold ${bigN}px sans-serif`; nLines = wrapByMeasure(w.native, maxW); }
  const lineHn = bigN * 1.3, lineHt = sub * 1.5;
  let contentW = 0;
  ctx.font = `bold ${bigN}px sans-serif`;
  for (const l of nLines) contentW = Math.max(contentW, ctx.measureText(l).width);
  for (const l of tLines) contentW = Math.max(contentW, l.length * charW);
  const capW = Math.min(W * 0.94, contentW + 30 * unit);
  const contentH = nLines.length * lineHn + (nLines.length ? 6 * unit : 0) + tLines.length * lineHt;
  const capH = contentH + 18 * unit;
  const cx = clamp(w.x, capW / 2 + 4, W - capW / 2 - 4), cy = w.y;
  roundRect(cx - capW / 2, cy - capH / 2, capW, capH, 16 * unit);
  ctx.fillStyle = CAP_COLORS[w.hue]; ctx.fill();
  ctx.lineWidth = active === w ? 4 * unit : 2.5 * unit;
  ctx.strokeStyle = active === w ? "#ff5e93" : "rgba(255,255,255,0.9)"; ctx.stroke();
  let y = cy - contentH / 2;
  ctx.textBaseline = "middle";
  ctx.font = `bold ${bigN}px sans-serif`; ctx.fillStyle = "#7a4458"; ctx.textAlign = "center";
  for (const l of nLines) { ctx.fillText(l, cx, y + lineHn / 2); y += lineHn; }
  if (nLines.length) y += 6 * unit;
  ctx.font = `bold ${sub}px monospace`; ctx.textAlign = "left";
  for (const l of tLines) {
    const lw = l.length * charW; let x = cx - lw / 2; const ly = y + lineHt / 2;
    for (const c of l) {
      const done = c.gi < w.matched;
      if (c.ch === " ") {
        // スペースは「目印（小さなスペースバー）」で見えるように
        const mw = charW * 0.62, mh = Math.max(2.5, 3 * unit);
        ctx.fillStyle = done ? "#ff3d7f" : "rgba(154,125,139,0.5)";
        roundRect(x + (charW - mw) / 2, ly + sub * 0.26, mw, mh, mh / 2); ctx.fill();
      } else {
        ctx.fillStyle = done ? "#ff3d7f" : "#9a7d8b";
        ctx.fillText(c.ch, x, ly);
      }
      x += charW;
    }
    y += lineHt;
  }
  ctx.textAlign = "center";
}

function drawWord(w) {
  if (w.sentence) return drawSentence(w);
  const isActive = active === w;
  const single = w.native === w.typed;
  const bigSize = clamp(30 * unit, 18, 40), subSize = clamp(20 * unit, 13, 26);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = `bold ${bigSize}px sans-serif`;
  const nativeW = ctx.measureText(w.native).width;
  ctx.font = `bold ${subSize}px monospace`;
  const typedW = ctx.measureText(w.typed).width;
  const capW = Math.max(nativeW, typedW) + 34 * unit;
  const capH = (single ? bigSize * 1.6 : bigSize * 1.5 + subSize * 1.3) + 10 * unit;
  const cx = clamp(w.x, capW / 2 + 4, W - capW / 2 - 4), cy = w.y;
  roundRect(cx - capW / 2, cy - capH / 2, capW, capH, 16 * unit);
  ctx.fillStyle = CAP_COLORS[w.hue]; ctx.fill();
  ctx.lineWidth = isActive ? 4 * unit : 2 * unit; ctx.strokeStyle = isActive ? "#ff5e93" : "rgba(255,255,255,0.85)"; ctx.stroke();
  if (single) { drawTypedLine(w, cx, cy, bigSize); }
  else {
    ctx.font = `bold ${bigSize}px sans-serif`; ctx.fillStyle = "#7a4458"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(w.native, cx, cy - subSize * 0.55);
    drawTypedLine(w, cx, cy + bigSize * 0.55, subSize);
  }
}
function drawTypedLine(w, cx, cy, size) {
  ctx.font = `bold ${size}px monospace`; ctx.textBaseline = "middle";
  const full = w.typed, totalW = ctx.measureText(full).width;
  let x = cx - totalW / 2; ctx.textAlign = "left";
  for (let i = 0; i < full.length; i++) {
    ctx.fillStyle = i < w.matched ? "#ff3d7f" : "#9a7d8b";
    ctx.fillText(full[i], x, cy); x += ctx.measureText(full[i]).width;
  }
  ctx.textAlign = "center";
}

function drawHUD() {
  const s1 = clamp(34 * unit, 26, 50);
  text("スコア " + score, s1, clamp(24 * unit, 16, 28), "#ff5e93", "left");
  const s2 = s1 + clamp(21 * unit, 16, 25);
  text("ベスト " + best + "  |  " + LANG_LABEL[lang] + " / " + cfg.label, s2, clamp(14 * unit, 11, 17), "#a8436b", "left");
  // ライフ(左)
  const hr = clamp(11 * unit, 8, 14), hy = s2 + clamp(20 * unit, 15, 24);
  for (let i = 0; i < cfg.lives; i++) { ctx.fillStyle = i < lives ? "#ff5e93" : "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(24 + i * hr * 2.5, hy, hr, 0, Math.PI * 2); ctx.fill(); }
  // やめるボタン(右上)
  pill(quitRect(), "rgba(255,255,255,0.85)", "#ff8fb5", "⏸ やめる", "#c14b76");
  // 下部ステータス
  text("コンボ " + combo + (maxCombo ? " (max " + maxCombo + ")" : ""), H - 16 * unit, clamp(15 * unit, 11, 18), "#a8436b", "left");
  text("せいかく " + accuracy() + "%  クリア " + cleared, H - 16 * unit, clamp(15 * unit, 11, 18), "#a8436b", "right", W - 16 * unit);
}

function draw() {
  ctx.save();
  if (shake > 0.4) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  drawBg();

  if (state === STATE.SELECT) {
    text("ふわもこタイピング", H * 0.18, clamp(40 * unit, 24, 50), "#ff5e93");
    text("3カ国語", H * 0.25, clamp(28 * unit, 18, 36), "#ff5e93");
    text("言語をえらんでね（PC=キーボード推奨）", H * 0.33, clamp(18 * unit, 12, 20), "#a8436b");
    const cards = selectCards();
    const labels = { en: "English", zh: "中文", ja: "日本語", mix: "ぜんぶ MIX" };
    const subs = { en: "type the word", zh: "拼音で打つ", ja: "ローマ字で打つ", mix: "ぜんぶ混ぜて" };
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i];
      roundRect(c.x, c.y, c.w, c.h, 18 * unit); ctx.fillStyle = CAP_COLORS[i]; ctx.fill();
      ctx.lineWidth = 2 * unit; ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.stroke();
      text(labels[c.lang], c.y + c.h * 0.45, clamp(24 * unit, 15, 28), "#7a4458", "center", c.x + c.w / 2);
      text(subs[c.lang], c.y + c.h * 0.72, clamp(14 * unit, 10, 17), "#a8436b", "center", c.x + c.w / 2);
    }
    text("（キーボード 1=英 2=中 3=日 4/Space=ぜんぶ）", H * 0.9, clamp(14 * unit, 10, 17), "#a8436b");
    ctx.restore(); return;
  }

  if (state === STATE.DIFF) {
    pill(backRect(), "rgba(255,255,255,0.85)", "#ff8fb5", "← もどる", "#c14b76");
    text("むずかしさをえらんでね", H * 0.2, clamp(34 * unit, 22, 42), "#ff5e93");
    text(LANG_LABEL[lang] + " モード", H * 0.27, clamp(18 * unit, 13, 22), "#a8436b");
    const cards = diffCards();
    const diffCol = [CAP_COLORS[2], CAP_COLORS[1], CAP_COLORS[5], CAP_COLORS[4]];
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i], d = DIFFS[c.key];
      roundRect(c.x, c.y, c.w, c.h, 16 * unit); ctx.fillStyle = diffCol[i]; ctx.fill();
      ctx.lineWidth = 2 * unit; ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.stroke();
      text((i + 1) + ". " + d.label, c.y + c.h * 0.42, clamp(22 * unit, 15, 28), "#7a4458", "center", c.x + c.w / 2);
      text(d.sub, c.y + c.h * 0.76, clamp(13 * unit, 10, 17), "#a8436b", "center", c.x + c.w / 2);
    }
    text("（キーボード 1/2/3/4 で選択・Escでもどる）", H * 0.92, clamp(14 * unit, 10, 17), "#a8436b");
    ctx.restore(); return;
  }

  // PLAY / PAUSE / OVER は盤面を描く
  ctx.save(); ctx.setLineDash([10, 8]); ctx.strokeStyle = "rgba(255,120,150,0.5)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, bottomLine); ctx.lineTo(W, bottomLine); ctx.stroke(); ctx.restore();
  words.forEach(drawWord);
  for (const p of pops) { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 5 * unit, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;
  drawHUD();

  if (state === STATE.PAUSE) {
    ctx.fillStyle = "rgba(120,60,90,0.45)"; ctx.fillRect(0, 0, W, H);
    text("ひとやすみ", H * 0.32, clamp(36 * unit, 24, 46), "#fff");
    pill(pauseResumeRect(), "#fff", null, "▶ つづける", "#ff5e93");
    pill(pauseEndRect(), "rgba(255,255,255,0.85)", null, "■ おわる（結果へ）", "#c14b76");
    text("（Space / Esc で つづける）", H * 0.78, clamp(15 * unit, 11, 18), "#fff");
  }
  if (state === STATE.OVER) {
    ctx.fillStyle = "rgba(120,60,90,0.5)"; ctx.fillRect(0, 0, W, H);
    text(endedManually ? "おつかれさま！" : "おしまい！", H * 0.32, clamp(40 * unit, 26, 50), "#fff");
    text("スコア " + score, H * 0.43, clamp(26 * unit, 18, 30), "#fff");
    text("クリア " + cleared + "ご  /  せいかく " + accuracy() + "%  /  最大コンボ " + maxCombo, H * 0.5, clamp(16 * unit, 12, 20), "#fff3b0");
    text("ベスト " + best + "  (" + LANG_LABEL[lang] + " / " + cfg.label + ")", H * 0.56, clamp(18 * unit, 13, 22), "#fff3b0");
    text("タップ / Space でメニューへ", H * 0.66, clamp(18 * unit, 13, 22), "#fff");
  }
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener("resize", resize);
resize(); loop();
</script>
</body>
