function update() {

    if (format === "practice") {
      if (words.length === 0) { const it = makeItem(nextPractice(), kind === "sentence"); it.x = W / 2; it.y = H * 0.46; it.vy = 0; words = [it]; active = it; }
    } else {
      if (kind === "sentence") { if (words.length === 0) { spawnT--; if (spawnT <= 0) { spawnGameItem(); spawnT = 28; } } }
      else { spawnT--; if (spawnT <= 0) { spawnGameItem(); spawnT = Math.max(cfg.spawnMin, cfg.spawnBase - elapsedSec() * cfg.spawnRamp) + Math.random() * 25; } }
      for (const w of words) w.y += w.vy;
      for (const w of words.slice()) {
        if (w.y > bottomLine) { lives--; shake = 8; combo = 0; if (active === w) active = null; words = words.filter(x => x !== w); if (lives <= 0) { gameOver(false); break; } }

  const sentence = kind === "sentence", it = makeItem(src, sentence), margin = W * 0.12;

    pill(pauseEndRect(), "rgba(255,255,255,0.85)", null, "■ おわる（結果へ）", "#c14b76");
    text("（Space / Esc で つづける）", H * 0.78, clamp(15 * unit, 11, 18), "#fff");
  }
  if (state === STATE.OVER) {
    ctx.fillStyle = "rgba(120,60,90,0.5)"; ctx.fillRect(0, 0, W, H);
    text(endedManually ? "おつかれさま！" : "おしまい！", H * 0.24, clamp(38 * unit, 24, 48), "#fff");
    text("スコア " + score + "  /  ベスト " + best, H * 0.33, clamp(22 * unit, 16, 28), "#fff");
    text("クリア " + cleared + "  /  せいかく " + accuracy() + "%  /  WPM " + wpm(), H * 0.39, clamp(16 * unit, 12, 20), "#fff3b0");
    text("最大コンボ " + maxCombo + "  /  " + (chosen ? chosen.label : "") + "（" + (format === "game" ? "ゲーム" : "れんしゅう") + "）", H * 0.44, clamp(14 * unit, 10, 18), "#fff3b0");
    // にがてキー(累計)
    const wk = weakKeys(allKeyStats, 6);
    text("にがてキー（これまでの合計）", H * 0.52, clamp(16 * unit, 12, 20), "#fff");
    if (!wk.length) { text("まだ なし！ かんぺき ✨", H * 0.59, clamp(18 * unit, 13, 22), "#fff3b0"); }
    else {
      const cw = clamp(54 * unit, 40, 66), gap = 10 * unit, cy0 = H * 0.55;
      const total = wk.length * cw + (wk.length - 1) * gap; let cxs = (W - total) / 2;
      for (const it of wk) {
        roundRect(cxs, cy0, cw, cw, 12 * unit); ctx.fillStyle = "rgba(255,255,255,0.92)"; ctx.fill();
        text(it.k, cy0 + cw * 0.46, clamp(26 * unit, 18, 32), "#ff3d7f", "center", cxs + cw / 2);
        text("×" + it.miss, cy0 + cw * 0.82, clamp(13 * unit, 9, 16), "#a8436b", "center", cxs + cw / 2);
        cxs += cw + gap;
      }
    }
    text("タップ / Space でメニューへ", H * 0.74, clamp(18 * unit, 13, 22), "#fff");
  }
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener("resize", resize);
resize(); loop();
</script>
</body>
</html>
