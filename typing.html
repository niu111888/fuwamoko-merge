<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ふわもこタイピング 3カ国語</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; width: 100%;
    background: #ffe3f1;
    font-family: -apple-system, "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "PingFang SC", sans-serif;
    overflow: hidden; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  #game { display: block; width: 100vw; height: 100vh; height: 100dvh; touch-action: none; cursor: pointer; }
  /* モバイルのソフトキーボード呼び出し用の隠し入力 */
  #kb { position: fixed; opacity: 0; pointer-events: none; top: 0; left: 0; width: 1px; height: 1px; border: 0; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<input id="kb" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="latin">
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const kb = document.getElementById("kb");
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

// ===== 単語データ(後で検証済みに差し替え) =====
const WORDS = {
  en: [
    { native: "bunny", typed: "bunny", hint: "うさぎ" },
    { native: "rabbit", typed: "rabbit", hint: "うさぎ" },
    { native: "piggy", typed: "piggy", hint: "こぶた" },
    { native: "panda", typed: "panda", hint: "パンダ" },
    { native: "carrot", typed: "carrot", hint: "にんじん" },
    { native: "heart", typed: "heart", hint: "ハート" },
    { native: "sky", typed: "sky", hint: "そら" },
    { native: "cloud", typed: "cloud", hint: "くも" },
    { native: "hug", typed: "hug", hint: "ぎゅっ" },
    { native: "smile", typed: "smile", hint: "えがお" },
    { native: "fluffy", typed: "fluffy", hint: "ふわふわ" },
    { native: "cute", typed: "cute", hint: "かわいい" },
    { native: "happy", typed: "happy", hint: "うれしい" },
    { native: "star", typed: "star", hint: "ほし" },
    { native: "rainbow", typed: "rainbow", hint: "にじ" },
    { native: "flower", typed: "flower", hint: "おはな" },
    { native: "jump", typed: "jump", hint: "ジャンプ" },
    { native: "sweet", typed: "sweet", hint: "あまい" },
    { native: "friend", typed: "friend", hint: "ともだち" },
    { native: "pink", typed: "pink", hint: "ピンク" },
  ],
  ja: [
    { native: "うさぎ", typed: "usagi", hint: "rabbit" },
    { native: "ねこ", typed: "neko", hint: "cat" },
    { native: "くま", typed: "kuma", hint: "bear" },
    { native: "ぱんだ", typed: "panda", hint: "panda" },
    { native: "ひよこ", typed: "hiyoko", hint: "chick" },
    { native: "りす", typed: "risu", hint: "squirrel" },
    { native: "ぺんぎん", typed: "pengin", hint: "penguin" },
    { native: "こあら", typed: "koara", hint: "koala" },
    { native: "いちご", typed: "ichigo", hint: "strawberry" },
    { native: "みるく", typed: "miruku", hint: "milk" },
    { native: "にんじん", typed: "ninjin", hint: "carrot" },
    { native: "ぷりん", typed: "purin", hint: "pudding" },
    { native: "けーき", typed: "keeki", hint: "cake" },
    { native: "あめ", typed: "ame", hint: "candy" },
    { native: "ほし", typed: "hoshi", hint: "star" },
    { native: "おはな", typed: "ohana", hint: "flower" },
    { native: "にじ", typed: "niji", hint: "rainbow" },
    { native: "つき", typed: "tsuki", hint: "moon" },
    { native: "くも", typed: "kumo", hint: "cloud" },
    { native: "すき", typed: "suki", hint: "love/like" },
  ],
  zh: [
    { native: "兔子", typed: "tuzi", hint: "rabbit" },
    { native: "猪", typed: "zhu", hint: "pig" },
    { native: "熊猫", typed: "xiongmao", hint: "panda" },
    { native: "熊", typed: "xiong", hint: "bear" },
    { native: "猫", typed: "mao", hint: "cat" },
    { native: "小狗", typed: "xiaogou", hint: "puppy" },
    { native: "老鼠", typed: "laoshu", hint: "mouse" },
    { native: "小鸡", typed: "xiaoji", hint: "chick" },
    { native: "鸭子", typed: "yazi", hint: "duck" },
    { native: "松鼠", typed: "songshu", hint: "squirrel" },
    { native: "狐狸", typed: "huli", hint: "fox" },
    { native: "刺猬", typed: "ciwei", hint: "hedgehog" },
    { native: "萝卜", typed: "luobo", hint: "radish" },
    { native: "苹果", typed: "pingguo", hint: "apple" },
    { native: "草莓", typed: "caomei", hint: "strawberry" },
    { native: "牛奶", typed: "niunai", hint: "milk" },
    { native: "蜂蜜", typed: "fengmi", hint: "honey" },
    { native: "蛋糕", typed: "dangao", hint: "cake" },
    { native: "星星", typed: "xingxing", hint: "star" },
    { native: "月亮", typed: "yueliang", hint: "moon" },
  ],
};
const LANG_LABEL = { en: "English", zh: "中文", ja: "日本語", mix: "ぜんぶ" };

// ===== レイアウト =====
let W, H, unit, topLine, bottomLine;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  unit = Math.min(W, H) / 700;
  topLine = H * 0.16;
  bottomLine = H * 0.86;
}

// ===== 状態 =====
const STATE = { SELECT: 0, PLAY: 1, OVER: 2 };
let state = STATE.SELECT;
let lang = "mix";
let words, active, spawnT, lives, score, combo, maxCombo, cleared, totalKeys, correctKeys, frame, startFrame, pops, shake, overAt;
let best = Number(localStorage.getItem("typingBest") || 0);
words = []; pops = []; frame = 0; shake = 0;
const isTouch = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

function pool() {
  if (lang === "mix") return [].concat(WORDS.en, WORDS.ja, WORDS.zh);
  return WORDS[lang] || WORDS.en;
}

function start(l) {
  lang = l;
  words = []; pops = []; active = null;
  lives = 3; score = 0; combo = 0; maxCombo = 0; cleared = 0;
  totalKeys = 0; correctKeys = 0;
  spawnT = 30; startFrame = frame;
  state = STATE.PLAY;
  if (isTouch) { try { kb.focus(); } catch (e) {} }
}

function gameOver() {
  state = STATE.OVER; overAt = frame;
  if (score > best) { best = score; localStorage.setItem("typingBest", best); }
  try { kb.blur(); } catch (e) {}
}

function elapsedSec() { return Math.max(0, (frame - startFrame) / 60); }
function accuracy() { return totalKeys ? Math.round(correctKeys / totalKeys * 100) : 100; }

// ===== 生成 =====
function spawnWord() {
  const p = pool();
  const w = p[Math.floor(Math.random() * p.length)];
  const margin = W * 0.12;
  words.push({
    native: w.native, typed: w.typed, hint: w.hint || "",
    x: margin + Math.random() * (W - margin * 2),
    y: topLine - 10 * unit, matched: 0,
    vy: (0.6 + Math.min(1.4, elapsedSec() / 50)) * unit,
    hue: Math.floor(Math.random() * 6),
  });
}

// ===== タイピング処理 =====
const CAP_COLORS = ["#ffd9ec", "#ffe7c2", "#d9f3d0", "#d6eeff", "#ece0ff", "#ffe0e0"];
function handleChar(ch) {
  if (state !== STATE.PLAY) return;
  if (!/^[a-z]$/.test(ch)) return;
  if (!active) {
    // 先頭文字が一致する一番下の単語をロック
    let cand = null;
    for (const w of words) {
      if (w.typed[0] === ch && (!cand || w.y > cand.y)) cand = w;
    }
    totalKeys++;
    if (cand) { active = cand; active.matched = 1; correctKeys++; combo++; maxCombo = Math.max(maxCombo, combo); checkComplete(); }
    else { combo = 0; shake = 4; }
    return;
  }
  totalKeys++;
  if (active.typed[active.matched] === ch) {
    active.matched++; correctKeys++; combo++; maxCombo = Math.max(maxCombo, combo);
    checkComplete();
  } else {
    combo = 0; shake = 4;
  }
}

function checkComplete() {
  if (active.matched >= active.typed.length) {
    const w = active;
    score += 100 + w.typed.length * 10 + combo * 5;
    cleared++;
    for (let i = 0; i < 16; i++) pops.push({ x: w.x, y: w.y, vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.7) * 7, life: 1, c: CAP_COLORS[w.hue] });
    words = words.filter(x => x !== w);
    active = null;
  }
}

// ===== 入力 =====
function onTapSelect(x, y) {
  // 4つの言語カードのどれを選んだか
  const cards = selectCards();
  for (const c of cards) if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h) { start(c.lang); return; }
}
function tap(x, y) {
  if (state === STATE.SELECT) onTapSelect(x, y);
  else if (state === STATE.OVER) { if (frame - overAt > 24) state = STATE.SELECT; }
}
canvas.addEventListener("pointerdown", e => {
  e.preventDefault();
  tap(e.clientX, e.clientY);
  if (state === STATE.PLAY && isTouch) { try { kb.focus(); } catch (err) {} }
});
// デスクトップ: 物理キーボード
window.addEventListener("keydown", e => {
  if (state === STATE.SELECT) {
    if (e.code === "Digit1") start("en"); else if (e.code === "Digit2") start("zh");
    else if (e.code === "Digit3") start("ja"); else if (e.code === "Space" || e.code === "Enter" || e.code === "Digit4") start("mix");
    return;
  }
  if (state === STATE.OVER) { if (e.code === "Space" || e.code === "Enter") { if (frame - overAt > 24) state = STATE.SELECT; } return; }
  if (state === STATE.PLAY && !isTouch) {
    if (e.key && e.key.length === 1) { e.preventDefault(); handleChar(e.key.toLowerCase()); }
  }
});
// モバイル: 隠し入力のinputイベント
kb.addEventListener("input", e => {
  const d = e.data;
  if (d) for (const ch of d) handleChar(ch.toLowerCase());
  kb.value = "";
});

// ===== 更新 =====
function update() {
  frame++;
  if (shake > 0) shake *= 0.8;
  if (state === STATE.PLAY) {
    spawnT--;
    if (spawnT <= 0) {
      spawnWord();
      const base = Math.max(38, 95 - elapsedSec() * 1.1);
      spawnT = base + Math.random() * 30;
    }
    for (const w of words) w.y += w.vy;
    // 落下しきった単語 → ミス
    for (const w of words.slice()) {
      if (w.y > bottomLine) {
        lives--; shake = 8; combo = 0;
        if (active === w) active = null;
        words = words.filter(x => x !== w);
        if (lives <= 0) { gameOver(); break; }
      }
    }
  }
  for (const p of pops) { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.03; }
  pops = pops.filter(p => p.life > 0);
}

// ===== 描画 =====
function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

function drawBg() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#ffe3f1"); sky.addColorStop(1, "#d8f0ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  for (let i = 0; i < 4; i++) {
    const cx = ((i * (W / 3 + 40) - frame * 0.2) % (W + 120) + W + 120) % (W + 120) - 60;
    const cy = H * 0.1 + i * H * 0.06;
    ctx.beginPath(); ctx.arc(cx, cy, 16 * unit, 0, Math.PI * 2); ctx.arc(cx + 20 * unit, cy, 22 * unit, 0, Math.PI * 2); ctx.arc(cx + 42 * unit, cy, 14 * unit, 0, Math.PI * 2); ctx.fill();
  }
}

function text(t, y, size, color, align, x) {
  ctx.fillStyle = color || "#fff"; ctx.font = `bold ${size}px sans-serif`;
  ctx.textAlign = align || "center"; ctx.textBaseline = "alphabetic";
  ctx.lineWidth = size * 0.12; ctx.strokeStyle = "rgba(120,60,90,0.35)";
  const px = x != null ? x : (align === "left" ? 20 : W / 2);
  ctx.strokeText(t, px, y); ctx.fillText(t, px, y);
}

function drawWord(w) {
  const isActive = active === w;
  const single = w.native === w.typed; // en
  const bigSize = clamp(30 * unit, 18, 40);
  const subSize = clamp(20 * unit, 13, 26);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  // 表示テキストの幅でカプセル
  ctx.font = `bold ${bigSize}px sans-serif`;
  const nativeW = ctx.measureText(w.native).width;
  ctx.font = `bold ${subSize}px sans-serif`;
  const typedW = ctx.measureText(w.typed).width;
  const capW = Math.max(nativeW, typedW) + 34 * unit;
  const capH = (single ? bigSize * 1.6 : bigSize * 1.5 + subSize * 1.3) + 10 * unit;
  const cx = clamp(w.x, capW / 2 + 4, W - capW / 2 - 4);
  const cy = w.y;

  // カプセル
  roundRect(cx - capW / 2, cy - capH / 2, capW, capH, 16 * unit);
  ctx.fillStyle = CAP_COLORS[w.hue]; ctx.fill();
  ctx.lineWidth = isActive ? 4 * unit : 2 * unit;
  ctx.strokeStyle = isActive ? "#ff5e93" : "rgba(255,255,255,0.85)"; ctx.stroke();

  if (single) {
    // 英語: 単語を1行、打った分を色変え
    drawTypedLine(w, cx, cy, bigSize);
  } else {
    // ネイティブ表記(上) + ローマ字/ピンイン(下、進捗ハイライト)
    ctx.font = `bold ${bigSize}px sans-serif`;
    ctx.fillStyle = "#7a4458";
    ctx.fillText(w.native, cx, cy - subSize * 0.55);
    drawTypedLine(w, cx, cy + bigSize * 0.55, subSize);
  }
}

function drawTypedLine(w, cx, cy, size) {
  ctx.font = `bold ${size}px monospace`;
  const full = w.typed;
  const totalW = ctx.measureText(full).width;
  let x = cx - totalW / 2;
  ctx.textAlign = "left";
  for (let i = 0; i < full.length; i++) {
    const ch = full[i];
    ctx.fillStyle = i < w.matched ? "#ff3d7f" : "#9a7d8b";
    ctx.fillText(ch, x, cy);
    x += ctx.measureText(ch).width;
  }
  ctx.textAlign = "center";
}

function selectCards() {
  const cw = clamp(W * 0.34, 120, 240), ch = clamp(H * 0.13, 70, 130);
  const gx = 16 * unit, gy = 16 * unit;
  const cols = 2;
  const totalW = cols * cw + gx;
  const x0 = (W - totalW) / 2, y0 = H * 0.42;
  const langs = ["en", "zh", "ja", "mix"];
  const cards = [];
  for (let i = 0; i < 4; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    cards.push({ lang: langs[i], x: x0 + col * (cw + gx), y: y0 + row * (ch + gy), w: cw, h: ch });
  }
  return cards;
}

function draw() {
  ctx.save();
  if (shake > 0.4) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  drawBg();

  if (state === STATE.SELECT) {
    text("ふわもこタイピング", H * 0.2, clamp(40 * unit, 24, 50), "#ff5e93");
    text("3カ国語", H * 0.27, clamp(28 * unit, 18, 36), "#ff5e93");
    text("言語をえらんでね（PC=キーボード推奨）", H * 0.35, clamp(18 * unit, 12, 20), "#a8436b");
    const cards = selectCards();
    const labels = { en: "English", zh: "中文", ja: "日本語", mix: "ぜんぶ MIX" };
    const subs = { en: "type the word", zh: "拼音で打つ", ja: "ローマ字で打つ", mix: "ぜんぶ混ぜて" };
    for (let i = 0; i < cards.length; i++) {
      const c = cards[i];
      roundRect(c.x, c.y, c.w, c.h, 18 * unit);
      ctx.fillStyle = CAP_COLORS[i]; ctx.fill();
      ctx.lineWidth = 2 * unit; ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.stroke();
      text(labels[c.lang], c.y + c.h * 0.45, clamp(24 * unit, 15, 28), "#7a4458", "center", c.x + c.w / 2);
      text(subs[c.lang], c.y + c.h * 0.72, clamp(14 * unit, 10, 17), "#a8436b", "center", c.x + c.w / 2);
    }
    text("（キーボード 1=英 2=中 3=日 4/Space=ぜんぶ）", H * 0.88, clamp(14 * unit, 10, 17), "#a8436b");
    ctx.restore(); return;
  }

  // 下のライン(ここまで落ちるとミス)
  ctx.save(); ctx.setLineDash([10, 8]); ctx.strokeStyle = "rgba(255,120,150,0.5)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, bottomLine); ctx.lineTo(W, bottomLine); ctx.stroke(); ctx.restore();

  words.forEach(drawWord);

  for (const p of pops) { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 5 * unit, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;

  // HUD
  text("スコア " + score, clamp(34 * unit, 26, 50), clamp(24 * unit, 16, 28), "#ff5e93", "left");
  text("ベスト " + best + "  |  " + LANG_LABEL[lang], clamp(34 * unit, 26, 50) + clamp(22 * unit, 16, 26), clamp(14 * unit, 11, 17), "#a8436b", "left");
  // ライフ
  const hr = clamp(12 * unit, 9, 15);
  for (let i = 0; i < 3; i++) { ctx.fillStyle = i < lives ? "#ff5e93" : "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(W - 22 - i * hr * 2.6, 30, hr, 0, Math.PI * 2); ctx.fill(); }
  // コンボ・正確さ
  text("コンボ " + combo + (maxCombo ? " (max " + maxCombo + ")" : ""), H - 16 * unit, clamp(15 * unit, 11, 18), "#a8436b", "left");
  text("せいかく " + accuracy() + "%  クリア " + cleared, H - 16 * unit, clamp(15 * unit, 11, 18), "#a8436b", "right", W - 16 * unit);

  if (state === STATE.OVER) {
    ctx.fillStyle = "rgba(120,60,90,0.5)"; ctx.fillRect(0, 0, W, H);
    text("おしまい！", H * 0.34, clamp(40 * unit, 26, 50), "#fff");
    text("スコア " + score, H * 0.45, clamp(26 * unit, 18, 30), "#fff");
    text("クリア " + cleared + "ご  /  せいかく " + accuracy() + "%  /  最大コンボ " + maxCombo, H * 0.52, clamp(16 * unit, 12, 20), "#fff3b0");
    text("ベスト " + best, H * 0.58, clamp(20 * unit, 14, 24), "#fff3b0");
    text("タップ / Space でもう一回", H * 0.68, clamp(18 * unit, 13, 22), "#fff");
  }
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener("resize", resize);
window.addEventListener("pointerdown", () => { if (state === STATE.PLAY && isTouch) { try { kb.focus(); } catch (e) {} } });
resize(); loop();
</script>
</body>
</html>
